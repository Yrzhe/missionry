name = "missionry-api"
main = "src/index.ts"
compatibility_date = "2026-05-20"

[dev]
command = "edgespark dev"
local = true

[database]
name = "missionry"
schema = "src/defs/db_schema.ts"

[storage]
schema = "src/defs/storage_schema.ts"

[runtime]
defs = "src/defs/runtime.ts"

[vars]
MISSIONRY_IDLE_MS = "45000"
MISSIONRY_R2_PREFIX = "dev"
E2B_TEMPLATE_ID = ""
DEMO_E2B_MODE = "memory"

# Secrets entered through EdgeSpark dashboard / CLI:
# E2B_API_KEY
# OPENAI_API_KEY
# GITHUB_TOKEN
