project_id = "128e8007-dd5a-43d5-80cb-2da1fcf9f01f"
name = "missionry-api"
main = "src/index.ts"
compatibility_date = "2026-05-20"

[dev]
command = "edgespark dev"
local = true

[database]
name = "missionry"
schema = "src/defs/db_schema.ts"

[storage]
schema = "src/defs/storage_schema.ts"

[runtime]
defs = "src/defs/runtime.ts"

[vars]
MISSIONRY_IDLE_MS = "120000"
MISSIONRY_R2_PREFIX = "dev"
E2B_TEMPLATE_ID = ""
# Production-safe defaults. Local dev overrides these via server/.env
# (DEMO_E2B_MODE=memory, EDGESPARK_DEV_AS_ADMIN=true) which take precedence
# for `edgespark dev`. Never ship memory mode or the dev-admin bypass to prod.
DEMO_E2B_MODE = "live"
EDGESPARK_DEV_AS_ADMIN = "false"

# Secrets entered through EdgeSpark dashboard / CLI:
# E2B_API_KEY
# OPENAI_API_KEY
# GITHUB_TOKEN
