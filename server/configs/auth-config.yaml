# yaml-language-server: $schema=https://schemas.edgespark.dev/v1/auth-config.schema.json

disableSignUp: true

session:
  expiresIn: 604800
  updateAge: 86400
  disableSessionRefresh: false

providerEmailPassword:
  enabled: true
  config:
    minPasswordLength: 10
    # Email verification is OFF until an email-delivery provider is configured —
    # turning it on without SMTP would lock out every account (no way to verify).
    # disableSignUp: true is the actual security fix (no open self-registration).
    requireEmailVerification: false
    requirePasswordResetEmailVerification: false
    revokeSessionsOnPasswordReset: true
